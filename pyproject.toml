[project]
name = "health-agent"
version = "0.1.0"
description = "LangGraph-based health agent with RAG over wellness resources"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.4",
    "langchain>=0.3",
    "langchain-openai>=0.3",
    "langchain-anthropic>=0.3",
    "langchain-xai>=0.2",
    "langchain-text-splitters>=0.3",
    "chromadb>=1.0",
    "pydantic-settings>=2.0",
    "typer>=0.15",
    "fastapi>=0.115",
    "uvicorn>=0.34",
]

[project.scripts]
health-agent = "health_agent.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
]
